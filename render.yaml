services:
  # ── FastAPI Backend ──────────────────────────────────────────────────────
  - type: web
    name: codevision-api
    runtime: python
    rootDir: .
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: codevision-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false          # Set manually in Render dashboard
      - key: JUDGE0_API_KEY
        sync: false
      - key: JUDGE0_API_HOST
        value: judge0-ce.p.rapidapi.com
      - key: JUDGE0_API_URL
        value: https://judge0-ce.p.rapidapi.com
      - key: DEBUG
        value: "false"
    healthCheckPath: /health

  # ── PostgreSQL Database ──────────────────────────────────────────────────
databases:
  - name: codevision-db
    databaseName: codevision
    user: codevision
    plan: free
